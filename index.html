<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Fabrics — দোকান তালিকা</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#0d0f14;
    --panel:#15181f;
    --panel2:#1b1f29;
    --line:#272c38;
    --gold:#c9a84c;
    --green:#4ecb71;
    --red:#e05252;
    --cream:#e8e4d8;
    --muted:#8a8f9c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--cream);
    font-family:'Noto Sans Bengali','DM Mono',monospace;
    min-height:100vh;
  }
  .wrap{max-width:720px;margin:0 auto;padding:20px 16px 80px;}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .header-left{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  header h1{font-size:19px;margin:0;color:var(--gold);letter-spacing:.3px;font-weight:700;}
  header .count{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}

  .lang-toggle{
    display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex-shrink:0;
  }
  .lang-toggle button{
    background:var(--panel);border:none;color:var(--muted);font-size:12px;font-weight:700;
    padding:7px 12px;cursor:pointer;font-family:inherit;
  }
  .lang-toggle button.active{background:var(--gold);color:#15120a;}

  .time-btn{
    display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:9px;
    background:var(--panel);color:var(--cream);font-size:12px;font-weight:600;
    padding:7px 12px;cursor:pointer;font-family:'DM Mono',monospace;flex-shrink:0;
  }
  .time-btn:hover{border-color:var(--gold);color:var(--gold);}

  .sync-btn{
    display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:9px;
    background:var(--panel);color:var(--muted);font-size:12px;font-weight:600;
    padding:7px 12px;cursor:pointer;font-family:'DM Mono',monospace;flex-shrink:0;
  }
  .sync-btn:hover{border-color:var(--gold);color:var(--gold);}
  .sync-btn.connected{border-color:var(--green);color:var(--green);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .sync-btn.connected .sync-dot{background:var(--green);box-shadow:0 0 6px var(--green);}
  .sync-status-msg{font-size:12.5px;color:var(--green);margin:0 0 14px;display:flex;align-items:center;gap:6px;}
  .sync-status-msg.off{color:var(--muted);}

  .cal-modal{padding:0;overflow:hidden;}
  .cal-modal .cal-head{
    background:linear-gradient(160deg,#1a1306,var(--bg));padding:8px 12px 6px;position:relative;
  }
  .cal-modal .cal-close{
    position:absolute;top:7px;right:8px;width:24px;height:24px;border-radius:50%;
    background:rgba(255,255,255,.08);border:none;color:var(--cream);font-size:13px;cursor:pointer;
  }
  .cal-modal h3{margin:0 0 2px;color:var(--gold);font-size:14px;font-weight:700;}
  .cal-sub{font-size:10px;color:var(--muted);margin:1px 0;display:flex;align-items:center;gap:4px;}

  .cal-tabs{display:flex;border-bottom:1px solid var(--line);}
  .cal-tab{
    flex:1;text-align:center;padding:5px 4px;font-size:10px;font-weight:700;cursor:pointer;
    background:var(--panel2);color:var(--muted);border:none;font-family:inherit;
    display:flex;align-items:center;justify-content:center;gap:3px;
  }
  .cal-tab.active{background:var(--gold);color:#15120a;}

  .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:5px 8px 2px;}
  .cal-nav button{
    width:22px;height:22px;border-radius:5px;border:1px solid var(--line);background:var(--panel2);
    color:var(--cream);cursor:pointer;font-size:12px;
  }
  .cal-nav button:hover{border-color:var(--gold);color:var(--gold);}
  .cal-nav .cal-month-label{font-size:12px;font-weight:700;color:var(--cream);}

  .cal-weekdays{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));padding:2px 4px 1px;width:100%;box-sizing:border-box;}
  .cal-weekdays span{text-align:center;font-size:9px;color:var(--muted);padding:2px 0;}
  .cal-weekdays span.fri{color:var(--green);}
  .cal-weekdays span.sat{color:var(--red);opacity:.8;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));padding:0 4px 8px;gap:2px;width:100%;box-sizing:border-box;overflow:visible;}
  .cal-cell{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;
    border-radius:5px;color:var(--cream);padding:1px;
  }
  .cal-cell.empty{visibility:hidden;}
  .cal-cell.fri{color:var(--green);}
  .cal-cell.sat{color:var(--red);opacity:.8;}
  .cal-cell.today{background:var(--gold);color:#15120a !important;font-weight:700;}
  .cal-cell.today.fri{color:#15120a !important;}
  .cal-cell.today.sat{color:#15120a !important;}
  .cal-cell{cursor:pointer;position:relative;}
  .cal-cell.has-note::after{content:'•';position:absolute;bottom:1px;right:4px;color:var(--gold);font-size:14px;}

  .backup-row{display:flex;gap:8px;margin-bottom:16px;}
  .backup-btn{
    flex:1;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:9px 10px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
  }
  .backup-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--panel2);}

  .searchbar{
    display:flex;gap:8px;margin-bottom:16px;
  }
  .searchbar input{
    flex:1;background:var(--panel);border:1px solid var(--line);color:var(--cream);
    padding:11px 14px;border-radius:10px;font-size:14px;font-family:inherit;
  }
  .searchbar input:focus{outline:none;border-color:var(--gold);}

  .add-bazar-btn{
    width:100%;background:var(--panel);border:1px dashed var(--line);color:var(--gold);
    padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:18px;
    font-family:inherit;
  }
  .add-bazar-btn:hover{border-color:var(--gold);background:var(--panel2);}

  .market-select-btn{
    width:100%;display:flex;align-items:center;justify-content:space-between;
    background:var(--panel);border:1px solid var(--line);color:var(--cream);
    padding:14px 16px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:18px;
    font-family:inherit;text-align:left;
  }
  .market-select-btn:hover{border-color:var(--gold);background:var(--panel2);}
  .market-select-btn .msb-name{color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .market-select-btn .msb-arrow{color:var(--muted);font-size:13px;flex-shrink:0;margin-left:10px;}

  .market-list-item{
    display:flex;align-items:center;justify-content:space-between;padding:12px 14px;gap:8px;
    border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--panel2);
  }
  .market-list-item:hover{border-color:var(--gold);}
  .market-list-item.current{border-color:var(--gold);background:#241f12;}
  .market-list-name{font-size:14px;font-weight:600;color:var(--cream);display:flex;align-items:center;gap:8px;min-width:0;}
  .market-list-name span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .market-list-actions{display:flex;gap:4px;flex-shrink:0;}

  .market-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;}
  .market-header-title{display:flex;align-items:center;gap:10px;min-width:0;}
  .market-header-name{font-size:17px;font-weight:700;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .bazar{
    margin-bottom:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden;
  }
  .bazar-head{
    display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;
  }
  .bazar-head:hover{background:var(--panel2);}
  .bazar-title{display:flex;align-items:center;gap:10px;}
  .bazar-name{font-size:15px;font-weight:700;color:var(--cream);}
  .bazar-badge{
    font-family:'DM Mono',monospace;font-size:11px;color:var(--bg);background:var(--gold);
    padding:2px 8px;border-radius:20px;font-weight:600;
  }
  .chev{color:var(--muted);font-size:13px;transition:transform .2s;}
  .bazar.open .chev{transform:rotate(90deg);}

  .bazar-actions{display:flex;gap:6px;}
  .icon-btn{
    background:transparent;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px 6px;border-radius:6px;
  }
  .icon-btn:hover{color:var(--red);background:#2a1c1c;}

  .shop-list{display:none;border-top:1px solid var(--line);}
  .bazar.open .shop-list{display:block;}

  .shop{
    display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);gap:10px;
  }
  .shop:last-child{border-bottom:none;}
  .shop-info{min-width:0;}
  .shop-name{font-size:14px;font-weight:600;color:var(--cream);}
  .shop-owner{font-size:12px;color:var(--muted);margin-top:2px;}
  .shop-phone{font-family:'DM Mono',monospace;font-size:12.5px;color:var(--green);margin-top:3px;}
  .shop-date{font-size:11.5px;color:var(--gold);margin-top:4px;}
  .shop-note{font-size:12px;color:var(--cream);margin-top:5px;font-style:italic;opacity:.85;line-height:1.4;}
  .shop-added{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--muted);margin-top:2px;}

  .shop-actions{display:flex;gap:6px;flex-shrink:0;}
  .pill-btn{
    border:1px solid var(--line);background:var(--panel2);color:var(--cream);
    width:34px;height:34px;border-radius:9px;font-size:15px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;text-decoration:none;
  }
  .pill-btn.call:hover{border-color:var(--green);color:var(--green);}
  .pill-btn.wa:hover{border-color:var(--green);color:var(--green);}
  .pill-btn.edit:hover{border-color:var(--gold);color:var(--gold);}
  .pill-btn.del:hover{border-color:var(--red);color:var(--red);}

  .add-shop-row{padding:10px 16px 14px;}

  .day-toggle-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
  .day-toggle-btn{
    flex:1;min-width:0;padding:8px 4px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--muted);font-size:12px;font-weight:700;
    cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;
  }
  .day-toggle-btn.selected{background:var(--gold);border-color:var(--gold);color:#15120a;}
  .day-toggle-btn.fri{color:var(--green);}
  .day-toggle-btn.fri.selected{background:var(--green);border-color:var(--green);color:#0d1a10;}

  /* Day View Card */
  .dv-card{margin:10px 0 14px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel);font-size:93%;}
  .dv-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 6px;border-bottom:1px solid var(--line);}
  .dv-title{font-size:12px;font-weight:700;color:var(--gold);}
  .dv-tabs{display:flex;overflow-x:auto;background:var(--panel2);border-bottom:1px solid var(--line);}
  .dv-tabs::-webkit-scrollbar{display:none;}
  .dv-tab{
    flex:1;min-width:0;padding:6px 3px;font-size:10px;font-weight:700;color:var(--muted);
    cursor:pointer;border:none;background:transparent;font-family:inherit;
    border-bottom:2px solid transparent;white-space:nowrap;text-align:center;
  }
  .dv-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .dv-tab.today{color:var(--green);}
  .dv-tab.active.today{color:var(--green);border-bottom-color:var(--green);}
  .dv-list{padding:4px 0;}
  .dv-body{overflow:hidden;max-height:0;}
  .dv-body.open{max-height:none;}
  .dv-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:7px 12px;border-bottom:1px solid var(--line);gap:8px;
  }
  .dv-item:last-child{border-bottom:none;}
  .dv-item-info{min-width:0;}
  .dv-item-name{font-size:12px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dv-item-sub{font-size:10px;color:var(--muted);margin-top:1px;}
  .dv-item-phone{font-size:10.5px;color:var(--green);font-family:'DM Mono',monospace;margin-top:1px;}
  .dv-item-actions{display:flex;gap:4px;flex-shrink:0;}
  .dv-empty{text-align:center;color:var(--muted);padding:12px;font-size:11px;}
  .dv-item-note{font-size:11px;color:var(--cream);opacity:.85;line-height:1.4;white-space:pre-wrap;word-break:break-word;}
  .dv-item-checklist{margin-top:4px;display:flex;flex-direction:column;gap:2px;}
  .dv-check-row{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--cream);}
  .dv-check-row.done{color:var(--muted);text-decoration:line-through;}
  .dv-check-dot{font-size:9px;color:var(--muted);flex-shrink:0;}
  .dv-check-dot.done{color:var(--green);}

  /* Note View Card - To-Do Style */
  .nv-card{margin:0 0 14px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel);font-size:93%;}
  .nv-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 6px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;}
  .nv-title{font-size:12px;font-weight:700;color:var(--gold);}
  .nv-body{overflow:hidden;max-height:0;}
  .nv-body.open{max-height:none;}

  /* quick-add bar */
  .nv-quick-add{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--line);}
  .nv-quick-input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--cream);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit;}
  .nv-quick-input:focus{outline:none;border-color:var(--gold);}
  .nv-quick-btn{background:var(--gold);border:none;color:#15120a;font-size:18px;font-weight:700;width:36px;border-radius:8px;cursor:pointer;flex-shrink:0;}
  .nv-quick-btn:hover{opacity:.85;}

  /* todo items */
  .nv-todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);}
  .nv-todo-item:last-child{border-bottom:none;}
  .nv-todo-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--muted);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;}
  .nv-todo-check.done{background:var(--green);border-color:var(--green);color:#0d1a10;}
  .nv-todo-text{flex:1;font-size:13px;color:var(--cream);line-height:1.5;word-break:break-word;cursor:pointer;}
  .nv-todo-text.done{color:var(--muted);text-decoration:line-through;}
  .nv-todo-del{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0;opacity:0;}
  .nv-todo-item:hover .nv-todo-del{opacity:1;}
  .nv-todo-del:hover{color:var(--red);}
  .nv-todo-meta{font-size:10px;color:var(--muted);margin-top:2px;}
  .nv-empty{text-align:center;color:var(--muted);padding:20px;font-size:12px;}

  /* filter tabs */

  .nv-item-edit{display:none;}
  .nv-search{display:none;}

  
    width:100%;background:transparent;border:1px dashed var(--line);color:var(--gold);
    padding:9px;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;
  }
  .add-shop-btn:hover{background:var(--panel2);}

  .empty{
    text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;line-height:1.7;
  }
  .empty b{color:var(--gold);}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:50;
    padding:12px;
  }
  .overlay.show{display:flex;}
  .modal{
    width:100%;max-width:480px;background:var(--panel);border:1px solid var(--line);
    border-radius:18px 18px 0 0;padding:20px 18px 26px;
    animation:up .18s ease-out;
    max-height:85vh;overflow-y:auto;
  }
  .modal.is-cal-modal{max-height:none;overflow:visible;padding:0 !important;border-radius:18px 18px 0 0;}
  @media(min-width:560px){
    .overlay{align-items:center;}
    .modal{border-radius:16px;max-height:80vh;}
    .modal.is-cal-modal{max-height:none;border-radius:16px;}
  }
  @keyframes up{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal h3{margin:0 0 14px;color:var(--gold);font-size:16px;}
  .modal p.confirm-msg{font-size:14px;color:var(--cream);line-height:1.6;margin:0 0 18px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .field input{
    width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--cream);
    padding:11px 12px;border-radius:9px;font-size:14px;font-family:inherit;
  }
  .field input:focus{outline:none;border-color:var(--gold);}
  .field textarea{
    width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--cream);
    padding:11px 12px;border-radius:9px;font-size:14px;font-family:inherit;resize:vertical;min-height:280px;
  }
  .field textarea:focus{outline:none;border-color:var(--gold);}
  .pill-btn.note.has-note{border-color:var(--gold);color:var(--gold);}
  .modal-actions{display:flex;gap:10px;margin-top:16px;}
  .btn{
    flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .btn.primary{background:var(--gold);color:#15120a;}
  .btn.primary:hover{opacity:.9;}
  .btn.danger{background:var(--red);color:#fff;}
  .btn.danger:hover{opacity:.9;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);}

  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--panel2);border:1px solid var(--line);color:var(--cream);
    padding:10px 18px;border-radius:30px;font-size:13px;z-index:60;opacity:0;transition:opacity .2s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-left">
      <h1>Dream Fabrics</h1>
      <span class="count" id="totalCount"></span>
    </div>
    <div class="lang-toggle">
      <button id="langBn">বাং</button>
      <button id="langEn">EN</button>
    </div>
    <button class="time-btn" id="timeBtn">🕐 <span id="timeBtnText"></span></button>
    <button class="sync-btn" id="syncBtn"><span class="sync-dot" id="syncDot"></span><span id="syncBtnText"></span></button>
  </header>

  <div class="backup-row">
    <button class="backup-btn" id="exportBtn"></button>
    <button class="backup-btn" id="importBtn"></button>
    <input type="file" id="importFile" accept=".json,application/json,text/plain" style="display:none;">
  </div>

  <button class="market-select-btn" id="marketSelectBtn">
    <span class="msb-name" id="marketSelectBtnText"></span>
    <span class="msb-arrow">▾</span>
  </button>

  <div id="emptyState" class="empty" style="display:none;"></div>

  <div class="dv-card" id="mainDvCard" style="display:none;">
    <div class="dv-header" onclick="toggleDayView()" style="cursor:pointer;user-select:none;">
      <span class="dv-title">🗓 <span id="dvTitle"></span></span>
      <span id="dvChev" style="color:var(--muted);font-size:11px;">▸</span>
    </div>
    <div class="dv-tabs" id="dvTabsBar"></div>
    <div class="dv-body" id="dvBody"><div id="dvList"></div></div>
  </div>

  <div class="nv-card" id="mainNvCard" style="display:none;">
    <div class="nv-header" onclick="toggleNoteView()">
      <span class="nv-title">✅ <span id="nvTitle"></span></span>
      <span id="nvChev" style="color:var(--muted);font-size:11px;">▸</span>
    </div>
    <div class="nv-body" id="nvBody">
    <div class="nv-quick-add">
        <input class="nv-quick-input" id="nvQuickInput" placeholder="নতুন কাজ লিখুন..." onkeydown="nvQuickEnter(event)">
        <button class="nv-quick-btn" onclick="nvQuickAdd()">+</button>
      </div>

function applyStaticText(){

  document.getElementById('exportBtn').textContent = t('exportBtn');

  document.getElementById('langBn').classList.toggle('active', lang === 'bn');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  updateSyncIndicator(syncEnabled);
}

async function setLang(newLang){
  lang = newLang;
  applyStaticText();
  render();
  try{ localStorage.setItem(LANG_KEY, lang); }catch(e){}
}

document.getElementById('langBn').addEventListener('click', () => setLang('bn'));
document.getElementById('langEn').addEventListener('click', () => setLang('en'));

function showConfirm(message, onYes, confirmLabel, onCancel){
  modalBackFn = onCancel || null;
  openModal(`
    <h3>${escapeHtml(t('confirmTitle'))}</h3>
    <p class="confirm-msg">${escapeHtml(message)}</p>
    <div class="modal-actions">
      <button class="btn ghost" onclick="goBack()">${escapeHtml(t('back'))}</button>
      <button class="btn danger" id="confirmYesBtn">${escapeHtml(confirmLabel || t('deleteBtn'))}</button>
    </div>
  `);
  document.getElementById('confirmYesBtn').onclick = async () => {
    modalBackFn = null;
    closeModal();
    await onYes();
  };
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function loadData(){
  try{
    const langVal = localStorage.getItem(LANG_KEY);
    if(langVal){ lang = langVal; }
  }catch(e){}
  try{
    const cm = localStorage.getItem(CURRENT_MARKET_KEY);
    if(cm){ currentMarketId = cm; }
  }catch(e){}
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      data = JSON.parse(raw);
    }
  }catch(e){
    data = { bazars: [] };
  }
  if(!data.calendarNotes) data.calendarNotes = {};
  if(!data.bazars) data.bazars = [];
  if(!data.todos) data.todos = [];
  applyStaticText();
  render();

  const cfg = loadFirebaseConfig();
  if(cfg){
    await initFirebase(cfg, true);
  }
}

async function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }catch(e){
    showToast(t('toastSaveError'));
  }
  if(syncEnabled && dbRef){
    try{
      suppressRemoteEcho = true;
      await dbRef.set(data);
    }catch(e){
      console.error(e);
    }finally{
      suppressRemoteEcho = false;
    }
  }
}

function showToast(msg){
  const tEl = document.getElementById('toast');
  tEl.textContent = msg;
  tEl.classList.add('show');
  setTimeout(()=>tEl.classList.remove('show'), 1600);
}

/* ---------- backup export / import (with fallbacks for unreliable mobile downloads) ---------- */

async function copyToClipboard(text){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){}
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }catch(e){
    return false;
  }
}

    </div>
  `);
}

function downloadBackupFile(){
  try{
    const json = document.getElementById('backupText').value;
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `dream_fabrics_backup_${dateStr}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(t('toastBackupDone'));
  }catch(e){
    console.error(e);
    showToast(lang==='bn' ? 'ডাউনলোড করা যায়নি, টেক্সট কপি করুন' : 'Could not download — please copy the text instead');
  }
}

async function copyBackupText(){
  const json = document.getElementById('backupText').value;
  const ok = await copyToClipboard(json);
  showToast(ok ? (lang==='bn'?'কপি হয়েছে':'Copied') : (lang==='bn'?'কপি করা যায়নি':'Could not copy'));

function processImportedJson(raw){
  try{
    const imported = JSON.parse(raw);
    if(!imported.bazars || !Array.isArray(imported.bazars)) throw new Error('invalid');
    showConfirm(t('confirmImport'), async () => {
      imported.bazars.forEach(b => {
        b.id = uid();
        (b.shops||[]).forEach(s => s.id = uid());
      });
      data.bazars = data.bazars.concat(imported.bazars);
      await saveData();
      render();
      showToast(t('toastImportDone'));
    }, t('continueBtn'));
  }catch(err){
    showToast(t('toastBadFile'));
  }
}

function importFromText(){
  const raw = document.getElementById('importText').value.trim();
  if(!raw){ showToast(lang==='bn' ? 'ব্যাকআপ টেক্সট পেস্ট করুন' : 'Please paste the backup text'); return; }
  closeModal();
  processImportedJson(raw);
}

function updateSyncIndicator(connected){
  const btn = document.getElementById('syncBtn');
  const txt = document.getElementById('syncBtnText');
  if(!btn || !txt) return;
  btn.classList.toggle('connected', !!connected);
  txt.textContent = connected ? t('syncBtnSynced') : t('syncBtnSetup');
}

async function initFirebase(cfg, isInitialLoad){
  try{
    if(typeof firebase === 'undefined'){ throw new Error('firebase sdk not loaded'); }
    if(firebase.apps && firebase.apps.length){
      await firebase.app().delete();
    }
    firebase.initializeApp(cfg);
    await firebase.auth().signInAnonymously();
    dbRef = firebase.database().ref('shopData');
    dbRef.on('value', (snapshot) => {
      if(suppressRemoteEcho) return;
      const val = snapshot.val();
      if(val){
        data = val;
        if(!data.calendarNotes) data.calendarNotes = {};
        if(!data.bazars) data.bazars = [];
        data.bazars.forEach(b => { if(!b.shops) b.shops = []; });
        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){}
        render();
      } else if(!isInitialLoad){
        // empty cloud db on first connect from this device — seed it
        dbRef.set(data).catch(()=>{});
      }
    }, (err) => {
      console.error(err);
      syncEnabled = false;
      updateSyncIndicator(false);
    });
    syncEnabled = true;
    updateSyncIndicator(true);
    return true;
  }catch(e){
    console.error(e);
    syncEnabled = false;
    updateSyncIndicator(false);
    if(!isInitialLoad) showToast(t('toastSyncFailed'));
    return false;
  }
}

function disconnectSync(){
  if(dbRef){ try{ dbRef.off(); }catch(e){} }
  dbRef = null;
  syncEnabled = false;
  clearFirebaseConfig();
  updateSyncIndicator(false);
  closeModal();
  showToast(t('toastSyncDisconnected'));
}

function parseFirebaseConfigText(raw){
  const start = raw.indexOf('{');
  const end = raw.lastIndexOf('}');
  if(start === -1 || end === -1 || end < start) throw new Error('bad format');
  const objText = raw.slice(start, end + 1);
  const parsed = new Function('"use strict"; return (' + objText + ');')();
  if(!parsed || !parsed.apiKey || !parsed.databaseURL) throw new Error('missing fields');
  return parsed;
}

let modalBackFn = null;
let navigationStack = []; // Track modal history
let isNavigatingBack = false; // Flag to prevent duplicate pushNav during back

function pushNav(fn, label){
  if(!isNavigatingBack){
    navigationStack.push({ fn, label });
  }
}

function openModalWithBack(html, backFn){
  modalBackFn = backFn || null;
  openModal(html);
}

function goBack(){
  if(navigationStack.length > 0){
    navigationStack.pop(); // Remove current
    if(navigationStack.length > 0){
      const prev = navigationStack[navigationStack.length - 1];
      if(prev.fn){
        isNavigatingBack = true;
        prev.fn();
        isNavigatingBack = false;
        return;
      }
    }
  }
  const fn = modalBackFn;
  modalBackFn = null;
  if(fn){ fn(); } else { closeModal(); }
}

function openModal(html){
  const modal = document.getElementById('modalContent');
  modal.innerHTML = html;
  document.getElementById('overlay').classList.add('show');
  const isCalModal = !!modal.querySelector('.cal-modal');
  modal.classList.toggle('is-cal-modal', isCalModal);
  modal.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        e.preventDefault();
        const primaryBtn = modal.querySelector('.btn.primary');
        if(primaryBtn) primaryBtn.click();
      }
    });
  });
}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
}
document.getElementById('overlay').addEventListener('click', (e)=>{
  if(e.target.id === 'overlay') closeModal();
});

/* ---------- calendar conversions ---------- */
const BN_DIGITS = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
function toBnNum(n){ return String(n).split('').map(c => /[0-9]/.test(c) ? BN_DIGITS[+c] : c).join(''); }

const GREG_MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const GREG_MONTHS_BN = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const HIJRI_MONTHS = ['Muharram','Safar',"Rabi' al-awwal","Rabi' al-thani",'Jumada al-awwal','Jumada al-thani','Rajab',"Sha'ban",'Ramadan','Shawwal',"Dhu al-Qi'dah",'Dhu al-Hijjah'];
const HIJRI_MONTHS_BN = ['মুহাররম','সফর','রবিউল আউয়াল','রবিউস সানি','জমাদিউল আউয়াল','জমাদিউস সানি','রজব','শাবান','রমজান','শাওয়াল','জিলকদ','জিলহজ্জ'];

const BANGLA_MONTHS = ['বৈশাখ','জ্যৈষ্ঠ','আষাঢ়','শ্রাবণ','ভাদ্র','আশ্বিন','কার্তিক','অগ্রহায়ণ','পৌষ','মাঘ','ফাল্গুন','চৈত্র'];

function isGregLeap(y){ return (y%4===0 && y%100!==0) || y%400===0; }

function gregorianToJD(y,m,d){
  const a = Math.floor((14-m)/12);
  const yy = y + 4800 - a;
  const mm = m + 12*a - 3;
  return d + Math.floor((153*mm+2)/5) + 365*yy + Math.floor(yy/4) - Math.floor(yy/100) + Math.floor(yy/400) - 32045;
}
function jdToGregorian(jd){
  let a = jd + 32044;
  let b = Math.floor((4*a+3)/146097);
  let c = a - Math.floor((146097*b)/4);
  let d = Math.floor((4*c+3)/1461);
  let e = c - Math.floor((1461*d)/4);
  let m = Math.floor((5*e+2)/153);
  const day = e - Math.floor((153*m+2)/5) + 1;
  const month = m + 3 - 12*Math.floor(m/10);
  const year = 100*b + d - 4800 + Math.floor(m/10);
  return { year, month, day };
}

/* Islamic tabular calendar (Kuwaiti algorithm) */
function islamicToJD(y,m,d){
  return d + Math.ceil(29.5*(m-1)) + (y-1)*354 + Math.floor((3+11*y)/30) + 1948440 - 1;
}
function jdToIslamic(jd){
  let l = Math.floor(jd) - 1948440 + 10632;
  const n = Math.floor((l-1)/10631);
  l = l - 10631*n + 354;
  const j = (Math.floor((10985-l)/5316))*(Math.floor((50*l)/17719)) + (Math.floor(l/5670))*(Math.floor((43*l)/15238));
  l = l - (Math.floor((30-j)/15))*(Math.floor((17719*j)/50)) - (Math.floor(j/16))*(Math.floor((15238*j)/43)) + 29;
  const month = Math.floor((24*l)/709);
  const day = l - Math.floor((709*month)/24);
  const year = 30*n + j - 30;
  return { year, month, day };
}
function islamicMonthLength(y,m){
  if(m===12) return isIslamicLeap(y) ? 30 : 29;
  return m%2===1 ? 30 : 29;
}
function isIslamicLeap(y){ return ((11*y+14)%30) < 11; }

function dateToJD(date){ return gregorianToJD(date.getFullYear(), date.getMonth()+1, date.getDate()); }

/* Bangla calendar (post-2019 revision, New Year fixed April 14) */
function banglaMonthLengths(gYearOfNewYear){
  // gYearOfNewYear = Gregorian year in which Boishakh 1 falls
  const choitroLeap = isGregLeap(gYearOfNewYear+1);
  return [31,31,31,31,31,30,30,30,30,30,30, choitroLeap?31:30];
}
function gregorianToBangla(date){
  const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();
  let gYear = (m > 4 || (m===4 && d>=14)) ? y : y-1;
  const newYearJD = gregorianToJD(gYear,4,14);
  const jd = gregorianToJD(y,m,d);
  let dayOffset = jd - newYearJD;
  const lengths = banglaMonthLengths(gYear);
  let month = 0;
  while(dayOffset >= lengths[month]){ dayOffset -= lengths[month]; month++; }
  return { year: gYear-593, month: month+1, day: dayOffset+1 };
}
function banglaToGregorianJD(bYear, bMonth, bDay){
  const gYear = bYear + 593;
  const newYearJD = gregorianToJD(gYear,4,14);
  const lengths = banglaMonthLengths(gYear);
  let offset = 0;
  for(let i=0;i<bMonth-1;i++) offset += lengths[i];
  return newYearJD + offset + (bDay-1);
}

  const modal = document.getElementById('modalContent');
  modal.innerHTML = renderCalendarHTML();
  modal.classList.add('is-cal-modal');
}

function renderCalGrid(){
  const v = calView[calTab];
  const today = new Date();
  const ty = today.getFullYear();
  const tm = today.getMonth() + 1;
  const td = today.getDate();

  let monthLabel = '', startDate, monthLen, todayDay = 0, todayMonth = 0, todayYear = 0;

  if(calTab === 'greg'){
    monthLabel = lang==='bn' ? GREG_MONTHS_BN[v.month-1]+' '+toBnNum(v.year) : GREG_MONTHS_EN[v.month-1]+' '+v.year;
    startDate = new Date(v.year, v.month-1, 1);
    monthLen = new Date(v.year, v.month, 0).getDate();
    todayYear = ty; todayMonth = tm; todayDay = td;
  } else if(calTab === 'hijri'){
    const todayJD = dateToJD(today);
    const jd1 = islamicToJD(v.year, v.month, 1);
    const g = jdToGregorian(jd1);
    startDate = new Date(g.year, g.month-1, g.day);
    monthLen = islamicMonthLength(v.year, v.month);
    monthLabel = lang==='bn' ? HIJRI_MONTHS_BN[v.month-1]+' '+toBnNum(v.year) : HIJRI_MONTHS[v.month-1]+' '+v.year;
    const ht = jdToIslamic(todayJD);
    todayYear = ht.year; todayMonth = ht.month; todayDay = ht.day;
  } else {
    const jd1 = banglaToGregorianJD(v.year, v.month, 1);
    const g = jdToGregorian(jd1);
    startDate = new Date(g.year, g.month-1, g.day);
    monthLen = banglaMonthLengths(v.year+593)[v.month-1];
    monthLabel = BANGLA_MONTHS[v.month-1]+' '+toBnNum(v.year);
    const bt = gregorianToBangla(today);
    todayYear = bt.year; todayMonth = bt.month; todayDay = bt.day;
  }

  const vy = Number(v.year);
  const vm = Number(v.month);
  const startWeekday = startDate.getDay();

  let html = '';
  for(let i=0; i<startWeekday; i++){
    html += '<div class="cal-cell empty"></div>';
  }
  for(let day=1; day<=monthLen; day++){
    const col = (startWeekday + day - 1) % 7;
    const isFri = (col === 5);
    const isSat = (col === 6);
    const isToday = (day === todayDay && vm === todayMonth && vy === todayYear);
    const label = (lang==='bn' || calTab==='bangla') ? toBnNum(day) : String(day);
    const dateKey = calTab+'_'+vy+'_'+vm+'_'+day;
    const hasNote = data.calendarNotes[dateKey] ? true : false;
    let cls = 'cal-cell';
    if(isToday){ cls += ' today'; }
    else if(isFri){ cls += ' fri'; }
    else if(isSat){ cls += ' sat'; }
    if(hasNote){ cls += ' has-note'; }
    html += '<div class="'+cls+'" data-t="'+calTab+'" data-y="'+vy+'" data-m="'+vm+'" data-d="'+day+'">'+label+'</div>';
  }

  const weekdayHtml = WEEKDAYS.map(function(w,i){
    return '<span class="'+(i===5?'fri':i===6?'sat':'')+'">' + w + '</span>';
  }).join('');

  const navLabel = escapeHtml(monthLabel);
  return '<div class="cal-nav"><button onclick="navCal(-1)">&#8249;</button><span class="cal-month-label">'+navLabel+'</span><button onclick="navCal(1)">&#8250;</button></div><div class="cal-weekdays">'+weekdayHtml+'</div><div class="cal-grid" id="calGrid" onclick="calGridClick(event)">'+html+'</div>';
}

}

function switchDvTab(idx){
  const body = document.getElementById('dvBody');
  const chev = document.getElementById('dvChev');
  if(dvActiveDay === idx){
    const open = body.classList.toggle('open');
    if(chev) chev.textContent = open ? '▾' : '▸';
  } else {
    dvActiveDay = idx;
    body.classList.add('open');
    if(chev) chev.textContent = '▾';
    renderDvList();
  }
  renderDvTabs();
}

function renderDvList(){
  const el = document.getElementById('dvList');
  if(!el) return;

  // Collect shops from ALL markets that have this day
  const shops = [];
  (data.bazars||[]).forEach(b => {
    b.shops.forEach(s => {
      const days = Array.isArray(s.visitDays)&&s.visitDays.length
        ? s.visitDays
        : (s.visitDay!==null&&s.visitDay!==undefined ? [Number(s.visitDay)] : []);
      if(days.includes(dvActiveDay)){
        shops.push({ ...s, _bazarName: b.name });
      }
    });
  });

  if(shops.length===0){
    el.innerHTML=`<div class="dv-empty">${lang==='bn'?'এই দিনে কোনো দোকান নেই':'No shops on this day'}</div>`;
    return;
  }

  el.innerHTML = '<div class="dv-list">'+shops.map(s=>{
    const note = typeof s.note === 'string'
      ? { text: s.note, items: [] }
      : (s.note || { text: '', items: [] });
    const hasText = note.text && note.text.trim();
    const hasItems = note.items && note.items.length > 0;
    const hasNote = hasText || hasItems;

    const notePreview = hasText
      ? `<div class="dv-item-note">${escapeHtml(note.text.length>80 ? note.text.slice(0,80)+'…' : note.text)}</div>` : '';
    const checkPreview = hasItems
      ? `<div class="dv-item-checklist">${note.items.slice(0,3).map(it=>`
          <div class="dv-check-row${it.done?' done':''}">
            <span class="dv-check-dot${it.done?' done':''}">${it.done?'✓':'○'}</span>
            <span>${escapeHtml(it.text)}</span>
          </div>`).join('')}${note.items.length>3?`<div style="color:var(--muted);font-size:10px;margin-top:2px;">+${note.items.length-3} more</div>`:''}</div>` : '';

    // Find bazarId for this shop
    const bazar = (data.bazars||[]).find(b=>b.shops.some(x=>x.id===s.id));
    const bazarId = bazar ? bazar.id : '';

    return `
    <div class="dv-item">
      <div class="dv-item-info" style="min-width:0;">
        <div class="dv-item-name">${escapeHtml(s.shopName||s.ownerName||'—')}</div>
        ${s.ownerName&&s.shopName?`<div class="dv-item-sub">${escapeHtml(t('ownerPrefix'))}${escapeHtml(s.ownerName)}</div>`:''}
        <div class="dv-item-sub" style="color:var(--gold);opacity:.8;">🏬 ${escapeHtml(s._bazarName)}</div>
        ${s.phone?`<div class="dv-item-phone">${escapeHtml(s.phone)}</div>`:''}
      </div>
      <div class="dv-item-actions">
        ${s.phone?`<a class="pill-btn call" href="tel:${cleanPhone(s.phone)}" style="width:30px;height:30px;font-size:13px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></a>`:''}
        ${s.phone?`<a class="pill-btn wa" href="https://wa.me/${waNumber(s.phone)}" target="_blank" style="width:30px;height:30px;font-size:13px;"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.94L2 22l5.25-1.38a9.86 9.86 0 0 0 4.79 1.22h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.13-2.9-7C17.18 3.03 14.7 2 12.04 2zm0 18.13h-.01a8.2 8.2 0 0 1-4.18-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.18 8.18 0 0 1-1.26-4.36c0-4.53 3.69-8.22 8.24-8.22 2.2 0 4.27.86 5.82 2.42a8.18 8.18 0 0 1 2.42 5.82c0 4.53-3.69 8.2-8.24 8.2zm4.52-6.16c-.25-.12-1.47-.72-1.69-.81-.23-.08-.39-.12-.56.13-.17.25-.64.81-.78.97-.14.17-.29.18-.53.06-.25-.12-1.05-.39-2-1.24-.74-.66-1.24-1.48-1.39-1.73-.14-.25-.02-.38.11-.51.12-.12.27-.31.41-.47.14-.16.18-.27.27-.45.09-.18.04-.34-.04-.47-.08-.13-.5-1.2-.69-1.65-.18-.43-.37-.37-.51-.38-.13-.01-.28-.01-.43-.01-.15 0-.39.06-.6.31-.21.25-.8.78-.8 1.9 0 1.12.82 2.2.93 2.35.11.15 1.55 2.37 3.76 3.23 1.86.73 2.24.59 2.65.55.41-.04 1.32-.54 1.51-1.06.18-.52.18-.96.13-1.06-.05-.1-.18-.16-.43-.28z"/></svg></a>`:''}
        ${bazarId?`<button class="pill-btn note${hasNote?' has-note':''}" onclick="noteModal('${bazarId}','${s.id}',true)" style="width:30px;height:30px;font-size:13px;">📝</button>`:''}
      </div>
    </div>
  `}).join('')+'</div>';
}

</script>
</body>
